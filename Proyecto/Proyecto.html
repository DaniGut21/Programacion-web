<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuneWiki - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="contenedor">
        
        <!-- Decoración superior -->
        <div class="linea-futuro"></div>
        
        <!-- Logo -->
        <div class="logo">
            TUNE<span>WIKI</span>
        </div>
        <div class="subtitulo">2026 • FUTURO DE LA MÚSICA</div>

        <h1>¡Bienvenido de vuelta!</h1>
        <p>Conéctate al universo de música,<br>historia y videos en un solo lugar.</p>

        <!-- Formulario -->
        <form>
            <input type="text" placeholder="Usuario o correo electrónico" required>
            <input type="password" placeholder="Contraseña" required>

            <!-- Botón Iniciar Sesión -->
            <a href="principal.html" style="text-decoration: none;">
                <button type="button" class="boton-iniciar">
                    INICIAR SESIÓN
                </button>
            </a>

            <!-- Botón Registrarse -->
            <a href="registro.html" style="text-decoration: none;">
                <button type="button" class="boton-registro">
                    REGISTRARSE
                </button>
            </a>

            <a href="#" class="enlace-olvidar">¿Olvidaste tu contraseña?</a>
        </form>

        <!-- Pie de página -->
        <div class="pie">
            Este sitio está protegido por reCAPTCHA.<br>
            Términos • Privacidad • © 2026 TuneWiki
        </div>
        
        <!-- Decoración inferior -->
        <div class="linea-futuro"></div>

    </div>

</body>
</html>
