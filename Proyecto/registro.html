<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuneWiki - Registrarse</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>

    <div class="contenedor">
        
        <div class="linea-futuro"></div>
        
        <!-- Logo -->
        <div class="logo">
            TUNE<span>WIKI</span>
        </div>
        <div class="subtitulo">2026 • EL FUTURO DE LA MÚSICA</div>

        <h1>¡Crea tu cuenta!</h1>
        <p>Únete y descubre como se hizo tu musica favorita.</p>

        <!-- Formulario de registro -->
        <form>
            <input type="text" placeholder="Nombre completo" required>
            <input type="text" placeholder="Usuario o correo electrónico" required>
            <input type="password" placeholder="Contraseña" required>
            <input type="password" placeholder="Confirmar contraseña" required>

            <!-- Los dos botones que pediste -->
            <div class="botones-registro">
                <!-- Botón 1: Enviar y regresar -->
                <a href="Proyecto.html" style="text-decoration: none;">
                    <button type="button" class="boton-regresar">
                        ENVIAR Y REGRESAR
                    </button>
                </a>

                <!-- Botón 2: Enviar e ingresar -->
                <a href="inicio.html" style="text-decoration: none;">
                    <button type="button" class="boton-ingresar">
                        ENVIAR E INGRESAR
                    </button>
                </a>
            </div>
        </form>

        <!-- Pie de página -->
        <div class="pie">
            Este sitio está protegido por reCAPTCHA.<br>
            Términos • Privacidad • © 2026 TuneWiki
        </div>
        
        <div class="linea-futuro"></div>

    </div>

</body>
</html>
