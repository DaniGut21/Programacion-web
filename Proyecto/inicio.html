<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuneWiki - Inicio</title>
    <link rel="stylesheet" href="inicio.css">
</head>
<body>

    <!-- Barra superior estilo Spotify + YouTube -->
    <header class="barra-superior">
        <div class="logo-header">
            TUNE<span>WIKI</span>
        </div>
        
        <!-- Barra de búsqueda (no funcional por ahora) -->
        <div class="buscador">
            <input type="text" placeholder="¿Qué quieres buscar hoy? 🎵" class="input-busqueda">
        </div>
        
        <div class="icono-perfil">👤</div>
    </header>

    <div class="contenido">
        <!-- Texto llamativo -->
        <h1 class="titulo-principal">¿Qué quieres oír hoy?</h1>

        <!-- Sección de géneros -->
        <h2 class="subtitulo-generos">Explora géneros</h2>
        
        <div class="grid-generos">
            <!-- Género 1 -->
            <a href="#" class="tarjeta-genero">
                <div class="icono">🎸</div>
                <span>Rock</span>
            </a>
            
            <!-- Género 2 -->
            <a href="#" class="tarjeta-genero">
                <div class="icono">🎤</div>
                <span>Pop</span>
            </a>
            
            <!-- Género 3 -->
            <a href="#" class="tarjeta-genero">
                <div class="icono">🎧</div>
                <span>EDM</span>
            </a>
            
            <!-- Género 4 -->
            <a href="#" class="tarjeta-genero">
                <div class="icono">🥁</div>
                <span>Salsa</span>
            </a>
            
            <!-- Género 5 -->
            <a href="#" class="tarjeta-genero">
                <div class="icono">🔥</div>
                <span>Reggaetón</span>
            </a>
            
            <!-- Género 6 -->
            <a href="#" class="tarjeta-genero">
                <div class="icono">🏙️</div>
                <span>Hip-Hop</span>
            </a>
            
            <!-- Género 7 -->
            <a href="#" class="tarjeta-genero">
                <div class="icono">🌿</div>
                <span>Indie</span>
            </a>
            
            <!-- Género 8 -->
            <a href="#" class="tarjeta-genero">
                <div class="icono">🤘</div>
                <span>Metal</span>
            </a>
        </div>
    </div>

</body>
</html>
